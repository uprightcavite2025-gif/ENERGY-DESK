<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="format-detection" content="telephone=no" />
  <title>When One Port Stop Changes the Story</title>
  <style>
    :root {
      --bg: #ffffff;
      --surface: #ffffff;
      --surface-soft: #f7f9fc;
      --border: #d9e2ec;
      --text: #16324f;
      --muted: #5f6c7b;
      --accent: #1f6feb;
      --accent-soft: #e9f2ff;
      --success: #0f7b6c;
      --success-soft: #e9fbf4;
      --warning: #a15d00;
      --warning-soft: #fff5e8;
      --danger: #a12828;
      --danger-soft: #fff0f0;
      --shadow: 0 12px 32px rgba(22, 50, 79, 0.08);
      --radius: 18px;
      --maxw: 900px;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      background: var(--bg);
      color: var(--text);
      font-family: Arial, Helvetica, sans-serif;
      min-height: 100%;
    }

    body {
      line-height: 1.6;
    }

    .app {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 10;
      background: rgba(255, 255, 255, 0.96);
      backdrop-filter: blur(8px);
      border-bottom: 1px solid var(--border);
    }

    .topbar-inner {
      width: min(100%, var(--maxw));
      margin: 0 auto;
      padding: 14px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      flex-wrap: wrap;
    }

    .brand {
      font-size: 0.95rem;
      font-weight: 700;
      letter-spacing: 0.02em;
    }

    .progress-wrap {
      display: flex;
      align-items: center;
      gap: 10px;
      flex: 1;
      min-width: 220px;
      justify-content: flex-end;
    }

    .progress-text {
      font-size: 0.9rem;
      color: var(--muted);
      white-space: nowrap;
    }

    .progress {
      height: 8px;
      width: min(260px, 38vw);
      background: #eef3f8;
      border-radius: 999px;
      overflow: hidden;
      border: 1px solid #e3eaf2;
    }

    .progress-bar {
      height: 100%;
      width: 0%;
      background: var(--accent);
      transition: width 0.28s ease;
    }

    main {
      flex: 1;
      width: min(100%, var(--maxw));
      margin: 0 auto;
      padding: 28px 20px 110px;
    }

    .screen {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 26px;
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 6px 12px;
      border-radius: 999px;
      background: var(--surface-soft);
      border: 1px solid var(--border);
      color: var(--muted);
      font-size: 0.88rem;
      margin-bottom: 14px;
    }

    h1, h2, h3 {
      margin: 0 0 14px;
      line-height: 1.25;
    }

    h1 { font-size: clamp(1.7rem, 4vw, 2.4rem); }
    h2 { font-size: clamp(1.35rem, 3vw, 1.8rem); }
    h3 { font-size: 1.08rem; }

    p {
      margin: 0 0 14px;
      color: var(--text);
      font-size: 1rem;
    }

    .lead {
      font-size: 1.08rem;
      color: var(--muted);
    }

    .stack > * + * {
      margin-top: 14px;
    }

    .route {
      display: grid;
      gap: 14px;
      margin: 18px 0 6px;
    }

    .route-line {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 10px;
      align-items: stretch;
    }

    .port {
      background: var(--surface-soft);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 14px;
      min-height: 92px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      position: relative;
    }

    .port strong {
      display: block;
      font-size: 1rem;
      margin-bottom: 4px;
    }

    .port small {
      color: var(--muted);
      font-size: 0.92rem;
    }

    .port.highlight {
      background: #fffdf6;
      border-color: #f0d9a8;
    }

    .callout {
      padding: 16px 18px;
      border-radius: 16px;
      border: 1px solid var(--border);
      background: var(--surface-soft);
    }

    .callout strong {
      display: block;
      margin-bottom: 6px;
    }

    .msg {
      border-left: 4px solid var(--accent);
      background: #f8fbff;
    }

    .question-title {
      font-size: 1.05rem;
      font-weight: 700;
      margin-bottom: 14px;
    }

    .options {
      display: grid;
      gap: 12px;
      margin-top: 18px;
    }

    .option-btn {
      width: 100%;
      text-align: left;
      border: 1px solid var(--border);
      background: #fff;
      color: var(--text);
      padding: 16px;
      border-radius: 16px;
      cursor: pointer;
      font: inherit;
      transition: transform 0.15s ease, border-color 0.15s ease, box-shadow 0.15s ease, background 0.15s ease;
    }

    .option-btn:hover,
    .option-btn:focus-visible {
      outline: none;
      border-color: var(--accent);
      background: #fbfdff;
      box-shadow: 0 0 0 3px rgba(31, 111, 235, 0.08);
      transform: translateY(-1px);
    }

    .option-btn.correct {
      border-color: var(--success);
      background: var(--success-soft);
    }

    .option-btn.incorrect {
      border-color: var(--danger);
      background: var(--danger-soft);
    }

    .feedback {
      margin-top: 16px;
      padding: 16px;
      border-radius: 16px;
      border: 1px solid var(--border);
      display: none;
    }

    .feedback.show { display: block; }
    .feedback.correct { background: var(--success-soft); border-color: #bfe9de; }
    .feedback.incorrect { background: var(--warning-soft); border-color: #f0d2a8; }

    .bullet-card {
      background: var(--surface-soft);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 16px 18px;
    }

    .bullet-card ul {
      margin: 10px 0 0 20px;
      padding: 0;
    }

    .bullet-card li + li { margin-top: 8px; }

    .anchor-line {
      margin-top: 16px;
      padding: 14px 16px;
      border-radius: 14px;
      background: #f8fbff;
      border: 1px dashed #bfd5f7;
      font-weight: 700;
    }

    .dual-cards {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
      margin-top: 16px;
    }

    .role-card {
      border: 1px solid var(--border);
      border-radius: 16px;
      background: var(--surface-soft);
      padding: 16px;
    }

    .role-card h3 { margin-bottom: 8px; }

    .footer-nav {
      position: fixed;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(255,255,255,0.98);
      border-top: 1px solid var(--border);
      padding: 14px 18px calc(14px + env(safe-area-inset-bottom));
    }

    .footer-nav-inner {
      width: min(100%, var(--maxw));
      margin: 0 auto;
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
    }

    .nav-group {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .nav-btn {
      border: 1px solid var(--border);
      background: #fff;
      color: var(--text);
      padding: 12px 18px;
      border-radius: 14px;
      font: inherit;
      cursor: pointer;
      min-width: 104px;
      transition: background 0.15s ease, border-color 0.15s ease, transform 0.15s ease;
    }

    .nav-btn:hover,
    .nav-btn:focus-visible {
      outline: none;
      border-color: var(--accent);
      transform: translateY(-1px);
    }

    .nav-btn.primary {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }

    .nav-btn[disabled] {
      opacity: 0.45;
      cursor: not-allowed;
      transform: none;
    }

    .screen-note {
      color: var(--muted);
      font-size: 0.92rem;
    }

    .restart {
      margin-top: 18px;
    }

    @media (max-width: 760px) {
      .screen { padding: 20px; }
      .route-line { grid-template-columns: 1fr; }
      .dual-cards { grid-template-columns: 1fr; }
      .progress-wrap { justify-content: flex-start; }
      .progress { width: 100%; }
      .footer-nav-inner { flex-direction: column; align-items: stretch; }
      .nav-group { width: 100%; justify-content: space-between; }
      .nav-btn { flex: 1; min-width: 0; }
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="topbar">
      <div class="topbar-inner">
        <div class="brand">Interactive Story</div>
        <div class="progress-wrap">
          <div class="progress-text" id="progressText">Page 1 of 1</div>
          <div class="progress" aria-hidden="true"><div class="progress-bar" id="progressBar"></div></div>
        </div>
      </div>
    </div>

    <main>
      <section class="screen" id="screen" aria-live="polite"></section>
    </main>

    <div class="footer-nav">
      <div class="footer-nav-inner">
        <div class="screen-note" id="screenNote">Read the story, then move to the next page.</div>
        <div class="nav-group">
          <button class="nav-btn" id="backBtn" type="button">Back</button>
          <button class="nav-btn primary" id="nextBtn" type="button">Next</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    const content = {
      quickTension: {
        id: 'quick-tension',
        type: 'question',
        eyebrow: 'Engage',
        title: 'One stop in the middle of the voyage suddenly becomes important.',
        intro: 'At first glance, Las Palmas may look like just another port visit. But this stop changes how the voyage can be understood later.',
        question: 'Why is this stop in Las Palmas important?',
        options: [
          {
            key: 'A',
            label: 'Because every port visited automatically becomes a port-of-call',
            correct: false,
            feedback: 'Incorrect. A visited port is not automatically a port-of-call under EU MRV. Cargo or passenger operations matter. Bunkering-only stops are excluded.'
          },
          {
            key: 'B',
            label: 'Because a bunkering-only stop may be treated differently in EU reporting',
            correct: true,
            feedback: 'Correct. A vessel may physically visit a port, but under EU MRV, a bunkering-only stop is not automatically treated as a port-of-call. That distinction affects how the voyage is understood later.'
          },
          {
            key: 'C',
            label: 'Because FuelEU ignores voyage pattern',
            correct: false,
            feedback: 'Incorrect. FuelEU uses voyage and fuel data. Voyage interpretation still matters because the data chain starts with the records created on board.'
          },
          {
            key: 'D',
            label: 'Because shore decides everything later',
            correct: false,
            feedback: 'Incorrect. Shore verifies and applies the rule set, but the vessel must still record the facts clearly.'
          }
        ]
      },
      masterDecision: {
        id: 'master-decision',
        type: 'question',
        eyebrow: 'Learn · Master perspective',
        title: 'From the bridge, the voyage story must stay clear.',
        intro: 'The vessel arrives in Las Palmas. No cargo operations take place. The vessel takes bunkers and later continues the voyage. You now need to ensure the stop is recorded and understood correctly.',
        question: 'How should Las Palmas be treated in the operational story of the voyage?',
        options: [
          {
            key: 'A',
            label: 'As a normal port-of-call',
            correct: false,
            feedback: 'Incorrect. This is the most important error in this branch. If you treat a bunkering-only stop as a normal port-of-call, the voyage structure may be interpreted incorrectly under EU MRV. That can affect later ETS coverage as well.'
          },
          {
            key: 'B',
            label: 'As a technical stop / bunkers only',
            correct: true,
            feedback: 'Correct. Las Palmas should be treated as a technical stop / bunkers only. Under EU MRV, a stop made solely for refuelling is excluded from the port-of-call definition. That means this stop should not be treated as a normal cargo-related port-of-call.'
          },
          {
            key: 'C',
            label: 'Leave the interpretation to shore and keep the entry generic',
            correct: false,
            feedback: 'Incorrect. Shore verifies the data, but it cannot replace clear onboard recording. The Master sends the operational data, and the Energy Analytics Department checks it afterward.'
          }
        ]
      },
      chiefDecision: {
        id: 'chief-decision',
        type: 'question',
        eyebrow: 'Learn · Chief Engineer perspective',
        title: 'From the engine side, the fuel story must stay accurate.',
        intro: 'The vessel receives bunkers in Las Palmas. The supplier documentation uses wording that may not match Seatrade’s required fuel classification clearly enough. You now need to decide how the fuel should be handled in the ship’s records.',
        question: 'What should you do with the fuel description?',
        options: [
          {
            key: 'A',
            label: 'Accept the supplier wording as-is',
            correct: false,
            feedback: 'Incorrect. Supplier wording is not always enough for compliance reporting. If the fuel is not classified correctly, the wrong factors may be applied later.'
          },
          {
            key: 'B',
            label: 'Verify and classify the fuel correctly',
            correct: true,
            feedback: 'Correct. The fuel must be verified and classified correctly. PR.OPS110 requires bunkers, consumptions, and fuel types to be recorded clearly and in a defined way. Incorrect fuel description can affect later emissions and FuelEU intensity calculations.'
          },
          {
            key: 'C',
            label: 'Record it now and ask shore to sort it out later',
            correct: false,
            feedback: 'Incorrect. Shore can review and verify, but it depends on accurate onboard records first. Incorrect fuel data can carry forward into reporting and compliance calculations.'
          }
        ]
      },
      crossRoleCheck: {
        id: 'cross-role-check',
        type: 'question',
        eyebrow: 'Learn · Shared understanding',
        title: 'Now the two sides of the same voyage meet.',
        intro: 'You have seen both perspectives. The next step is to connect them clearly.',
        question: 'Which statement best explains the difference between the two roles?',
        options: [
          {
            key: 'A',
            label: 'The Master and Chief Engineer both mainly do the same thing',
            correct: false,
            feedback: 'Incorrect. Their responsibilities connect, but they are not identical.'
          },
          {
            key: 'B',
            label: 'The Master controls voyage-leg and port-of-call clarity, while the Chief Engineer controls fuel-data accuracy',
            correct: true,
            feedback: 'Correct. The Master helps ensure the voyage and port activity are described correctly. The Chief Engineer helps ensure fuel data is correct and aligned across records. Both roles support the same compliance chain.'
          },
          {
            key: 'C',
            label: 'The Chief Engineer decides whether a stop is a port-of-call',
            correct: false,
            feedback: 'Incorrect. Port-of-call logic is part of voyage and operational interpretation, not fuel engineering.'
          },
          {
            key: 'D',
            label: 'The Master is responsible for FuelEU calculation',
            correct: false,
            feedback: 'Incorrect. FuelEU calculations are handled onshore, but they depend on correct onboard data.'
          }
        ]
      },
      finalDecision: {
        id: 'final-decision',
        type: 'question',
        eyebrow: 'Act',
        title: 'The practical lesson should now feel simple and clear.',
        intro: 'You have followed the voyage from both operational and engineering sides. One final decision remains.',
        question: 'What is the most important practical lesson from this scenario?',
        options: [
          {
            key: 'A',
            label: 'Shore will always fix onboard reporting issues later',
            correct: false,
            feedback: 'Incorrect. Shore verifies, but it depends on the vessel’s data first.'
          },
          {
            key: 'B',
            label: 'Officers are responsible for calculating EU regulations themselves',
            correct: false,
            feedback: 'Incorrect. Officers are not expected to calculate the regulations directly.'
          },
          {
            key: 'C',
            label: 'Clear voyage records and accurate fuel data must work together',
            correct: true,
            feedback: 'Correct. This scenario shows that voyage logic and fuel data are linked. Clear records from both operational and engineering sides support verification, reporting, and compliance.'
          },
          {
            key: 'D',
            label: 'Only cargo vessels need accurate fuel records',
            correct: false,
            feedback: 'Incorrect. Fuel accuracy remains important regardless of the vessel’s commercial role.'
          }
        ]
      }
    };

    const masterWhyMatters = {
      id: 'master-why',
      type: 'info',
      eyebrow: 'Learn · Why this matters',
      title: 'The Master does not calculate the regulation — but the Master helps define the voyage story.',
      html: `
        <div class="bullet-card">
          <strong>What this decision affects</strong>
          <ul>
            <li><strong>EU MRV:</strong> whether the stop qualifies as a port-of-call</li>
            <li><strong>EU ETS:</strong> which voyage legs are later financially covered</li>
            <li><strong>QMS reporting quality:</strong> whether Seatrade can verify the voyage clearly</li>
          </ul>
        </div>
        <div class="anchor-line">What looks like one small entry in the log can change how the whole voyage is understood later.</div>
      `
    };

    const chiefWhyMatters = {
      id: 'chief-why',
      type: 'info',
      eyebrow: 'Learn · Why this matters',
      title: 'The Chief Engineer does not manage penalties — but the Chief Engineer protects the quality of the fuel story.',
      html: `
        <div class="bullet-card">
          <strong>What this decision affects</strong>
          <ul>
            <li><strong>EU ETS:</strong> reported emissions depend on correct fuel data</li>
            <li><strong>FuelEU Maritime:</strong> GHG intensity depends on correct fuel classification and fuel-use records</li>
            <li><strong>QMS reporting quality:</strong> documents, BDN data, ROB, and reports must align</li>
          </ul>
        </div>
        <div class="anchor-line">If the fuel story is unclear, later calculations may start from the wrong foundation.</div>
      `
    };

    let screens = [];
    let currentIndex = 0;
    let firstRole = null;
    const answers = {};

    const screenEl = document.getElementById('screen');
    const progressText = document.getElementById('progressText');
    const progressBar = document.getElementById('progressBar');
    const screenNote = document.getElementById('screenNote');
    const backBtn = document.getElementById('backBtn');
    const nextBtn = document.getElementById('nextBtn');

    function buildScreens(role = null) {
      const roleIntroText = role === 'master'
        ? 'You chose to begin from the Master’s side. First, you follow the voyage through the operational story on board.'
        : role === 'chief'
        ? 'You chose to begin from the Chief Engineer’s side. First, you follow the voyage through the fuel story on board.'
        : 'Choose the role you want to experience first. You will still see the other side afterward.';

      const introScreens = [
        {
          id: 'cover',
          type: 'info',
          eyebrow: 'Engage',
          title: 'When one port stop changes the whole voyage story',
          html: `
            <p class="lead">What feels like one normal voyage on board may be interpreted very differently in regulation and reporting.</p>
 <div class="callout">
  <strong>Learning goal</strong>
  <p>Help officers understand that:</p>
  <ul style="margin: 10px 0 0 20px; padding-left: 18px; line-height: 1.7;">
    <li>the Master controls voyage-leg and port-of-call clarity</li>
    <li>the Chief Engineer controls fuel-data accuracy</li>
    <li>both roles influence:
      <ul style="margin-top: 8px; padding-left: 20px; line-height: 1.7;">
        <li><strong>EU MRV</strong></li>
        <li><strong>EU ETS</strong></li>
        <li><strong>FuelEU Maritime</strong></li>
      </ul>
    </li>
  </ul>
</div>
          `
        },
        {
          id: 'voyage',
          type: 'info',
          eyebrow: 'Engage',
          title: 'You are on board a container vessel, preparing to continue the voyage.',
          html: `
            <p>The route ahead looks straightforward at first:</p>
            <div class="route">
              <div class="route-line">
                <div class="port"><strong>Tangier</strong><small>Morocco</small></div>
                <div class="port"><strong>Valencia</strong><small>Spain</small></div>
                <div class="port highlight"><strong>Las Palmas</strong><small>Bunkers only</small></div>
                <div class="port"><strong>Rotterdam</strong><small>Netherlands</small></div>
              </div>
            </div>
            <div class="callout">
              <strong>At Las Palmas</strong>
              <p style="margin-bottom:0;">The vessel stops only to take bunkers. No cargo operations take place.</p>
            </div>
          `
        },
        {
          id: 'message',
          type: 'info',
          eyebrow: 'Engage',
          title: 'Before departure, a message arrives from Seatrade’s Energy Analytics Team.',
          html: `
            <div class="callout msg">
              <strong>Message from shore</strong>
              <p>Last year, discrepancies in voyage classification and fuel records created problems in EU reporting and FuelEU assessment.</p>
              <p style="margin-bottom:0;">This time, the data must be clear.</p>
            </div>
            <p class="lead">That warning changes the feeling on board. The voyage is no longer just about getting to the next port. It is also about making sure the story in the records is accurate from the start.</p>
          `
        },
        content.quickTension,
        {
          id: 'role-choice',
          type: 'role',
          eyebrow: 'Learn',
          title: 'Now you decide where the story begins.',
          intro: roleIntroText
        }
      ];

      const masterFlow = [
        content.masterDecision,
        masterWhyMatters,
        {
          id: 'see-other-chief',
          type: 'info',
          eyebrow: 'Learn · Cross-role view',
          title: 'You have seen the bridge side. Now look below deck.',
          html: `
            <p>You’ve completed your own role first. But this voyage does not stay clear unless the other officer’s records also support the same story.</p>
            <div class="callout">
              <strong>Next perspective</strong>
              <p style="margin-bottom:0;">Now look at the same voyage from the Chief Engineer’s side.</p>
            </div>
          `
        },
        content.chiefDecision,
        chiefWhyMatters
      ];

      const chiefFlow = [
        content.chiefDecision,
        chiefWhyMatters,
        {
          id: 'see-other-master',
          type: 'info',
          eyebrow: 'Learn · Cross-role view',
          title: 'You have seen the engine side. Now go back to the voyage story.',
          html: `
            <p>You’ve completed your own role first. But accurate fuel records still need to match the way the voyage itself is described.</p>
            <div class="callout">
              <strong>Next perspective</strong>
              <p style="margin-bottom:0;">Now look at the same voyage from the Master’s side.</p>
            </div>
          `
        },
        content.masterDecision,
        masterWhyMatters
      ];

      const endingScreens = [
        content.crossRoleCheck,
        {
          id: 'integrated-outcome',
          type: 'info',
          eyebrow: 'Act',
          title: 'When both officers get it right, the voyage becomes clear.',
          html: `
            <div class="bullet-card">
              <strong>If the Master records Las Palmas clearly as a bunkering-only technical stop, and the Chief Engineer verifies and classifies the fuel correctly:</strong>
              <ul>
                <li>the voyage can be interpreted correctly</li>
                <li>the correct voyage leg can be assessed under EU MRV</li>
                <li>ETS coverage can be applied correctly</li>
                <li>FuelEU calculations can rely on accurate fuel data</li>
                <li>the Energy Analytics Team can verify the voyage with fewer corrections</li>
              </ul>
            </div>
            <div class="anchor-line">Different officers record different parts of the story — but the system works only when those parts align.</div>
          `
        },
        content.finalDecision,
        {
          id: 'closing',
          type: 'info',
          eyebrow: 'Finish',
          title: 'One normal voyage on board. One complete story outside the vessel.',
          html: `
            <p>On board, this may feel like one normal voyage.</p>
            <p>But for Seatrade’s Energy Analytics Team, the voyage only becomes clear when the <strong>port activity</strong>, <strong>voyage leg</strong>, and <strong>fuel data</strong> all tell the same story.</p>
            <div class="dual-cards">
              <div class="role-card">
                <h3>Master</h3>
                <p style="margin-bottom:0;">Protects voyage-leg and port-of-call clarity.</p>
              </div>
              <div class="role-card">
                <h3>Chief Engineer</h3>
                <p style="margin-bottom:0;">Protects fuel-data accuracy and alignment.</p>
              </div>
            </div>
            <div class="restart">
              <button class="nav-btn" type="button" onclick="restartStory()">Restart story</button>
            </div>
          `
        }
      ];

      if (!role) {
        return introScreens;
      }

      return [
        ...introScreens,
        ...(role === 'master' ? masterFlow : chiefFlow),
        ...endingScreens
      ];
    }

    function renderScreen() {
      const screen = screens[currentIndex];
      if (!screen) return;

      const total = screens.length;
      const current = currentIndex + 1;
      progressText.textContent = `Page ${current} of ${total}`;
      progressBar.style.width = `${(current / total) * 100}%`;

      backBtn.disabled = currentIndex === 0;
      nextBtn.disabled = shouldDisableNext(screen);
      nextBtn.textContent = currentIndex === total - 1 ? 'Finish' : 'Next';

      if (screen.type === 'info') {
        screenEl.innerHTML = `
          <div class="eyebrow">${screen.eyebrow}</div>
          <h1>${screen.title}</h1>
          <div class="stack">${screen.html}</div>
        `;
        screenNote.textContent = 'Read this page, then continue when ready.';
      }

      if (screen.type === 'role') {
        screenEl.innerHTML = `
          <div class="eyebrow">${screen.eyebrow}</div>
          <h1>${screen.title}</h1>
          <p class="lead">${screen.intro}</p>
          <div class="options">
            <button class="option-btn" type="button" data-role="master">
              <strong>Master</strong><br />
              Start with voyage-leg and port-of-call clarity.
            </button>
            <button class="option-btn" type="button" data-role="chief">
              <strong>Chief Engineer</strong><br />
              Start with fuel-data accuracy and classification.
            </button>
          </div>
        `;

        screenEl.querySelectorAll('[data-role]').forEach(btn => {
          btn.addEventListener('click', () => {
            firstRole = btn.getAttribute('data-role');
            answers[screen.id] = firstRole;
            screens = buildScreens(firstRole);
            currentIndex = screens.findIndex(s => s.id === 'role-choice') + 1;
            renderScreen();
            window.scrollTo({ top: 0, behavior: 'smooth' });
          });
        });

        screenNote.textContent = 'Choose a role to continue the story.';
      }

      if (screen.type === 'question') {
        const answered = answers[screen.id];
        screenEl.innerHTML = `
          <div class="eyebrow">${screen.eyebrow}</div>
          <h1>${screen.title}</h1>
          <p class="lead">${screen.intro}</p>
          <div class="question-title">${screen.question}</div>
          <div class="options">
            ${screen.options.map(opt => `
              <button class="option-btn ${answered === opt.key ? (opt.correct ? 'correct' : 'incorrect') : ''}" type="button" data-option="${opt.key}">
                <strong>${opt.key}.</strong> ${opt.label}
              </button>
            `).join('')}
          </div>
          <div class="feedback ${answered ? 'show' : ''} ${answered ? (screen.options.find(o => o.key === answered).correct ? 'correct' : 'incorrect') : ''}" id="feedbackBox">
            ${answered ? screen.options.find(o => o.key === answered).feedback : ''}
          </div>
        `;

        screenEl.querySelectorAll('[data-option]').forEach(btn => {
          btn.addEventListener('click', () => {
            const choice = btn.getAttribute('data-option');
            answers[screen.id] = choice;
            renderScreen();
          });
        });

        screenNote.textContent = answered ? 'Feedback is shown below your answer. Continue when ready.' : 'Answer the question to unlock the next page.';
      }
    }

    function shouldDisableNext(screen) {
      if (!screen) return true;
      if (screen.type === 'question') {
        return !answers[screen.id];
      }
      if (screen.type === 'role') {
        return true;
      }
      return false;
    }

    function nextScreen() {
      if (currentIndex < screens.length - 1) {
        currentIndex += 1;
        renderScreen();
        window.scrollTo({ top: 0, behavior: 'smooth' });
      }
    }

    function previousScreen() {
      if (currentIndex > 0) {
        currentIndex -= 1;
        renderScreen();
        window.scrollTo({ top: 0, behavior: 'smooth' });
      }
    }

    function restartStory() {
      firstRole = null;
      for (const key in answers) delete answers[key];
      screens = buildScreens();
      currentIndex = 0;
      renderScreen();
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    backBtn.addEventListener('click', previousScreen);
    nextBtn.addEventListener('click', nextScreen);

    screens = buildScreens();
    renderScreen();

    window.restartStory = restartStory;
  </script>
</body>
</html>
